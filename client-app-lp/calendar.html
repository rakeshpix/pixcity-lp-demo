<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#ffffff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Pix.city — Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    /* ── Calendar page ──────────────────────────────────────── */
    .page { background: #fff; }

    /* Franchise bar */
    .franchise-bar {
      display: flex; gap: 0.45rem;
      padding: 0 1.25rem 0.75rem;
      overflow-x: auto; flex-shrink: 0;
    }
    .franchise-bar::-webkit-scrollbar { display: none; }
    .fchip {
      display: inline-flex; align-items: center;
      padding: 0.35rem 0.875rem; border-radius: 100px;
      font-size: 0.7rem; font-weight: 700;
      border: 1.5px solid var(--border); background: #fff;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      color: var(--gray); letter-spacing: 0.02em;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .fchip:hover   { border-color: var(--gray2); color: var(--dark); }
    .fchip:active  { transform: scale(0.96); }

    /* Calendar grid area */
    .cal-area { flex-shrink: 0; padding: 0 1.25rem 0; }
    .cal-month-nav {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 0.75rem;
    }
    .cal-month-title {
      font-size: 1.1rem; font-weight: 800;
      color: var(--dark); letter-spacing: -0.025em;
    }
    .cal-nav-btn {
      width: 34px; height: 34px; border-radius: 10px;
      border: 1px solid var(--border); background: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--gray);
      transition: background 0.15s ease;
    }
    .cal-nav-btn:hover { background: var(--gray-light); }

    /* Day-of-week header */
    .cal-dow {
      display: grid; grid-template-columns: repeat(7,1fr);
      margin-bottom: 0.375rem;
    }
    .cal-dow-cell {
      text-align: center; font-size: 0.62rem; font-weight: 800;
      color: #c0c4cc; letter-spacing: 0.05em;
      text-transform: uppercase; padding: 0.25rem 0;
    }

    /* Calendar cells */
    .cal-grid {
      display: grid; grid-template-columns: repeat(7,1fr); gap: 2px;
    }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 4px 2px 3px; border-radius: 10px;
      cursor: pointer; position: relative;
      transition: background 0.15s ease;
    }
    .cal-day:hover { background: var(--gray-light); }
    .cal-day.today .cal-day-num {
      background: var(--blue); color: #fff;
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-day.selected { background: var(--blue-pale); }
    .cal-day.other-month .cal-day-num { color: #d1d5db; }
    .cal-day-num {
      font-size: 0.77rem; font-weight: 700;
      color: var(--dark); margin-bottom: 2px; line-height: 1;
    }
    .cal-day-dots {
      display: flex; gap: 2px; flex-wrap: wrap; justify-content: center;
    }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    /* Selected-day deselect hint */
    .cal-filter-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 1.25rem 0;
      flex-shrink: 0;
    }
    .cal-day-label {
      font-size: 0.78rem; font-weight: 700; color: var(--dark);
    }
    .cal-clear-btn {
      font-size: 0.72rem; font-weight: 700; color: var(--blue);
      background: none; border: none; cursor: pointer;
      font-family: inherit;
    }

    /* Event list */
    .event-list { flex: 1; overflow-y: auto; }
    .event-list::-webkit-scrollbar { display: none; }

    .event-group-label {
      font-size: 0.7rem; font-weight: 800; color: var(--gray);
      letter-spacing: 0.05em; text-transform: uppercase;
      padding: 0.625rem 1.25rem 0.375rem;
      position: sticky; top: 0; background: #fff; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
    }
    .event-count-badge {
      background: var(--blue-pale); color: var(--blue);
      font-size: 0.6rem; font-weight: 800;
      padding: 0.15rem 0.45rem; border-radius: 100px;
    }

    .event-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1.25rem; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s ease;
    }
    .event-item:last-child { border-bottom: none; }
    .event-item:hover { background: var(--gray-light); }
    .event-color-bar { width: 3px; height: 40px; border-radius: 2px; flex-shrink: 0; }
    .event-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .event-info  { flex: 1; min-width: 0; }
    .event-title {
      font-size: 0.875rem; font-weight: 700; color: var(--dark);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .event-meta {
      font-size: 0.71rem; font-weight: 600; color: var(--gray);
      display: flex; align-items: center; gap: 0.4rem; margin-top: 2px;
    }
    .event-status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* ── Event detail sheet ─────────────────────────────────── */
  </style>
</head>
<body>
<div id="app">

  <div class="page">

    <!-- Status bar -->
    <div class="status-bar" style="background: #fff;">
      <span class="status-time">9:41</span>
      <div class="status-icons"></div>
    </div>

    <!-- Header -->
    <div class="app-header">
      <button class="header-btn" id="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span class="header-title" id="page-title">Calendar</span>
      <button class="header-btn" onclick="openDrawer()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="5" r="1"/>
          <circle cx="12" cy="12" r="1"/>
          <circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
    </div>

    <!-- Franchise bar -->
    <div class="franchise-bar" id="franchise-bar"></div>

    <!-- Calendar grid -->
    <div class="cal-area">
      <div class="cal-month-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div class="cal-month-title" id="cal-month-label">April 2026</div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
      <div class="cal-dow">
        <div class="cal-dow-cell">S</div><div class="cal-dow-cell">M</div>
        <div class="cal-dow-cell">T</div><div class="cal-dow-cell">W</div>
        <div class="cal-dow-cell">T</div><div class="cal-dow-cell">F</div>
        <div class="cal-dow-cell">S</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Filter chips -->
    <div class="chip-row" style="margin: 0.625rem 0 0.375rem;">
      <div class="chip active-all" data-filter="all"  onclick="setFilter('all',this)">All</div>
      <div class="chip" data-filter="CM"  onclick="setFilter('CM',this)">
        <span class="chip-dot" style="background: var(--cm-color);"></span>CM
      </div>
      <div class="chip" data-filter="PA"  onclick="setFilter('PA',this)">
        <span class="chip-dot" style="background: var(--pa-color);"></span>PA
      </div>
      <div class="chip" data-filter="PAC" onclick="setFilter('PAC',this)">
        <span class="chip-dot" style="background: var(--pac-color);"></span>PAC
      </div>
      <div class="chip" data-filter="PS"  onclick="setFilter('PS',this)">
        <span class="chip-dot" style="background: var(--ps-color);"></span>Photo
      </div>
    </div>

    <!-- Selected day / clear row -->
    <div class="cal-filter-row" id="filter-row" style="display: none;">
      <span class="cal-day-label" id="filter-day-label"></span>
      <button class="cal-clear-btn" onclick="clearDaySelection()">Show all month ×</button>
    </div>

    <div class="divider" style="margin-top: 0.375rem;"></div>

    <!-- Event list -->
    <div class="event-list" id="event-list"></div>

    <!-- Bottom nav -->
    <div class="bottom-nav">
      <button class="bnav-item" onclick="location.href='dashboard.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Home
      </button>
      <button class="bnav-item" id="bnav-mission">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        Missions
      </button>
      <button class="bnav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Calendar
      </button>
      <button class="bnav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        Account
      </button>
    </div>

  </div>

  <!-- ── Event detail sheet ─────────────────────────────────── -->
  <div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
  <div class="bottom-sheet" id="event-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div style="flex: 1;">
        <div style="margin-bottom: 0.5rem;" id="sheet-badges"></div>
        <div class="sheet-title" id="sheet-title">Event Title</div>
      </div>
      <button class="sheet-close" onclick="closeSheet()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body">
      <div style="margin-bottom: 1.25rem;">
        <div class="detail-row">
          <div class="detail-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <div>
            <div class="detail-label">Date</div>
            <div class="detail-value" id="sheet-date">—</div>
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
          </div>
          <div>
            <div class="detail-label">Mission</div>
            <div class="detail-value" id="sheet-mission">—</div>
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div>
            <div class="detail-label">Status</div>
            <div class="detail-value" id="sheet-status">—</div>
          </div>
        </div>
      </div>

      <div style="font-size: 0.85rem; font-weight: 800; color: var(--dark);
                  letter-spacing: -0.015em; margin-bottom: 0.875rem;">
        Task Breakdown
      </div>
      <div id="sheet-tasks"></div>

      <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
        <button style="flex:1;padding:0.75rem;border-radius:0.875rem;
                       border:1.5px solid var(--border);background:#fff;
                       font-family:inherit;font-size:0.875rem;font-weight:700;
                       color:var(--gray);cursor:pointer;">
          View Details
        </button>
        <button style="flex:1;padding:0.75rem;border-radius:0.875rem;
                       border:none;background:var(--blue);color:#fff;
                       font-family:inherit;font-size:0.875rem;font-weight:700;
                       cursor:pointer;box-shadow:0 2px 8px rgba(18,48,245,0.3);">
          Mark Done ✓
        </button>
      </div>
    </div>
  </div>

</div>

<script src="shared.js"></script>
<script>
  // Inject drawer
  injectDrawer('Calendar');

  // Status bar
  document.querySelector('.status-icons').innerHTML = STATUS_ICONS_HTML;
  startClock();

  // Read params
  const missionId  = parseInt(getParam('mission',  '0'));
  const contractId = parseInt(getParam('contract', '0'));
  const dayParam   = parseInt(getParam('day', '0'));

  const m = MISSIONS[missionId] || MISSIONS[0];

  // Back button — go to mission page
  document.getElementById('back-btn').onclick = () => {
    location.href = `mission.html?id=${missionId}`;
  };
  document.getElementById('bnav-mission').onclick = () => {
    location.href = `mission.html?id=${missionId}`;
  };

  // Page title
  document.title = `Pix.city — ${m.name} Calendar`;
  document.getElementById('page-title').textContent = m.name;

  // ── State ─────────────────────────────────────────────────── //
  let calYear         = 2026;
  let calMonth        = 3; // April
  let selectedDay     = dayParam || null;
  let activeFilter    = 'all';
  let activeFranchise = 'all';

  const TODAY_STR = '2026-04-24';

  // ── Franchise bar ─────────────────────────────────────────── //
  function renderFranchiseBar() {
    const bar = document.getElementById('franchise-bar');
    bar.innerHTML = '';
    const franchises = m.franchises || [];

    const makeChip = (id, label) => {
      const chip = document.createElement('div');
      chip.className = 'fchip';
      chip.textContent = label;
      const isActive = activeFranchise === id;
      if (isActive) {
        chip.style.cssText = `background:${m.color.from};border-color:${m.color.from};color:#fff;`;
      }
      chip.addEventListener('click', () => {
        activeFranchise = id;
        renderFranchiseBar();
        renderCalendar();
        renderEventList();
      });
      bar.appendChild(chip);
    };

    makeChip('all', 'All');
    franchises.forEach(f => makeChip(f.id, f.label));
  }

  renderFranchiseBar();

  // ── Helpers ───────────────────────────────────────────────── //
  function getDayStr(y, mo, d) {
    return `${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function filteredEvents() {
    return m.events.filter(e => {
      const d = new Date(e.date);
      return d.getFullYear() === calYear
          && d.getMonth()    === calMonth
          && (activeFilter    === 'all' || e.type      === activeFilter)
          && (activeFranchise === 'all' || e.franchise === activeFranchise);
    });
  }

  // ── Calendar render ───────────────────────────────────────── //
  function renderCalendar() {
    document.getElementById('cal-month-label').textContent =
      MONTH_NAMES[calMonth] + ' ' + calYear;

    const grid       = document.getElementById('cal-grid');
    grid.innerHTML   = '';
    const firstDay   = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth= new Date(calYear, calMonth + 1, 0).getDate();
    const daysInPrev = new Date(calYear, calMonth, 0).getDate();

    // Build event map for all events (not filtered by type) for dots
    const eventsByDay = {};
    m.events.forEach(e => {
      const d = new Date(e.date);
      if (d.getFullYear() === calYear && d.getMonth() === calMonth) {
        const day = d.getDate();
        if (!eventsByDay[day]) eventsByDay[day] = [];
        if ((activeFilter === 'all' || e.type === activeFilter) &&
            (activeFranchise === 'all' || e.franchise === activeFranchise))
          eventsByDay[day].push(e);
      }
    });

    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-day';

      let dayNum, isCurrentMonth = true;
      if (i < firstDay) {
        dayNum = daysInPrev - firstDay + i + 1;
        isCurrentMonth = false;
        cell.classList.add('other-month');
      } else if (i >= firstDay + daysInMonth) {
        dayNum = i - firstDay - daysInMonth + 1;
        isCurrentMonth = false;
        cell.classList.add('other-month');
      } else {
        dayNum = i - firstDay + 1;
        const dateStr = getDayStr(calYear, calMonth, dayNum);
        if (dateStr === TODAY_STR) cell.classList.add('today');
        if (dayNum === selectedDay) cell.classList.add('selected');
      }

      const numEl = document.createElement('div');
      numEl.className = 'cal-day-num';
      numEl.textContent = dayNum;
      cell.appendChild(numEl);

      if (isCurrentMonth && eventsByDay[dayNum]) {
        const dotsWrap = document.createElement('div');
        dotsWrap.className = 'cal-day-dots';
        const seen = new Set();
        eventsByDay[dayNum].forEach(e => {
          if (!seen.has(e.type)) {
            seen.add(e.type);
            const dot = document.createElement('div');
            dot.className = 'cal-dot';
            dot.style.background = TYPE_META[e.type].color;
            dotsWrap.appendChild(dot);
          }
        });
        cell.appendChild(dotsWrap);
      }

      if (isCurrentMonth) {
        cell.addEventListener('click', () => {
          selectedDay = (selectedDay === dayNum) ? null : dayNum;
          renderCalendar();
          renderEventList();
        });
      }
      grid.appendChild(cell);
    }
  }

  // ── Event list render ─────────────────────────────────────── //
  function renderEventList() {
    const list = document.getElementById('event-list');
    list.innerHTML = '';

    // Show/hide day filter bar
    const filterRow = document.getElementById('filter-row');
    if (selectedDay) {
      filterRow.style.display = 'flex';
      const d = new Date(getDayStr(calYear, calMonth, selectedDay));
      document.getElementById('filter-day-label').textContent =
        d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    } else {
      filterRow.style.display = 'none';
    }

    let events = filteredEvents();
    if (selectedDay !== null) {
      events = events.filter(e => new Date(e.date).getDate() === selectedDay);
    }

    if (events.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <p>No events${selectedDay ? ' on this day' : ' this month'}</p>
        </div>`;
      return;
    }

    // Group by date
    const grouped = {};
    events.forEach(e => {
      if (!grouped[e.date]) grouped[e.date] = [];
      grouped[e.date].push(e);
    });

    Object.keys(grouped).sort().forEach(dateStr => {
      const d = new Date(dateStr);
      const isToday = dateStr === TODAY_STR;
      const label = document.createElement('div');
      label.className = 'event-group-label';
      label.innerHTML = `
        <span>${isToday ? 'Today — ' : ''}${d.toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric'})}</span>
        <span class="event-count-badge">${grouped[dateStr].length}</span>`;
      list.appendChild(label);

      grouped[dateStr].forEach(ev => {
        const meta = TYPE_META[ev.type];
        const item = document.createElement('div');
        item.className = 'event-item animate-in';
        item.innerHTML = `
          <div class="event-color-bar" style="background: ${meta.color};"></div>
          <div class="event-icon" style="background: ${meta.pale};">
            <span style="font-size:0.68rem;font-weight:800;color:${meta.color};">${ev.type}</span>
          </div>
          <div class="event-info">
            <div class="event-title">${ev.title}</div>
            <div class="event-meta">
              <span class="event-status-dot"
                    style="background:${ev.status==='done'?'var(--green)':'var(--orange)'};"></span>
              <span>${ev.task}</span>
              <span>·</span>
              <span style="color:${ev.status==='done'?'var(--green)':'var(--orange)'};font-weight:700;">
                ${ev.status === 'done' ? 'Done' : 'Upcoming'}
              </span>
              ${ev.franchise && activeFranchise === 'all' ? `<span>·</span><span style="color:var(--blue);font-weight:700;">${(m.franchises||[]).find(f=>f.id===ev.franchise)?.label||''}</span>` : ''}
            </div>
          </div>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="#d1d5db" stroke-width="2.5">
            <polyline points="9 18 15 12 9 6"/>
          </svg>`;
        item.addEventListener('click', () => openSheet(ev));
        list.appendChild(item);
      });
    });
  }

  function clearDaySelection() {
    selectedDay = null;
    renderCalendar();
    renderEventList();
  }

  function changeMonth(delta) {
    calMonth += delta;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    selectedDay = null;
    renderCalendar();
    renderEventList();
  }

  function setFilter(f, el) {
    activeFilter = f;
    document.querySelectorAll('.chip').forEach(c => {
      c.className = 'chip';
      if (c.dataset.filter === f) {
        c.classList.add(f === 'all' ? 'active-all' : 'active-' + f.toLowerCase());
      }
    });
    renderCalendar();
    renderEventList();
  }

  // ── Event detail sheet ────────────────────────────────────── //
  function openSheet(ev) {
    const meta = TYPE_META[ev.type];
    const d    = new Date(ev.date);

    document.getElementById('sheet-title').textContent = ev.title;
    document.getElementById('sheet-date').textContent  =
      d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    document.getElementById('sheet-mission').textContent = m.name;
    document.getElementById('sheet-status').innerHTML  =
      `<span style="color:${ev.status==='done'?'var(--green)':'var(--orange)'};font-weight:800;">
        ${ev.status === 'done' ? '✓ Completed' : '⏳ Upcoming'}
      </span>`;

    document.getElementById('sheet-badges').innerHTML = `
      <span class="badge" style="background:${meta.pale};color:${meta.color};margin-right:4px;">
        ${ev.type} — ${meta.label}
      </span>
      <span class="badge" style="background:var(--gray-light);color:var(--dark2);">
        ${ev.task}
      </span>`;

    const tasks = getTaskBreakdown(ev.task, ev.status === 'done');
    document.getElementById('sheet-tasks').innerHTML = tasks.map(t => `
      <div class="task-row">
        <div class="task-name">${t.n}</div>
        <div class="task-bar-bg">
          <div class="task-bar-fill" style="width:${t.p}%;background:${meta.color};"></div>
        </div>
        <div class="task-pct">${t.p}%</div>
      </div>`).join('');

    document.getElementById('sheet-overlay').classList.add('open');
    document.getElementById('event-sheet').classList.add('open');
  }

  function closeSheet() {
    document.getElementById('sheet-overlay').classList.remove('open');
    document.getElementById('event-sheet').classList.remove('open');
  }

  // ── Init ──────────────────────────────────────────────────── //
  renderCalendar();
  renderEventList();

  // If a specific day was passed via URL, auto-select it
  if (dayParam) {
    selectedDay = dayParam;
    renderCalendar();
    renderEventList();
  }
</script>
</body>
</html>
