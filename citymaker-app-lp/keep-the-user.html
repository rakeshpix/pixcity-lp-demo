<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Keep User on Page Demo</title>
  </head>
  <body>
    <h2>Unsaved Changes Warning</h2>
    <p>
      Try clicking a link or closing this tab. A popup will ask you to confirm
      your decision to leave.
    </p>

    <script>
      window.addEventListener("beforeunload", function (event) {
        // Cancel the event
        event.preventDefault();
        // Chrome requires returnValue to be set
        event.returnValue =
          "Are you sure you want to leave? Your changes will be lost.";
      });
    </script>
  </body>
</html>
